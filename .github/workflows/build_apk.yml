name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library safely
        run: |
          TELEPHONY_DIR=$(find ~/.pub-cache -type d -name "telephony-0.2.0" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_DIR" ]; then
            echo "Found telephony at: $TELEPHONY_DIR"
            
            # حذف build.gradle القديم
            rm -f "$TELEPHONY_DIR/android/build.gradle"
            
            # كتابة build.gradle الجديد بطريقة آمنة (بدون EOF)
            printf "group 'com.shounakmulay.telephony'\n" > "$TELEPHONY_DIR/android/build.gradle"
            printf "version '1.0-SNAPSHOT'\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "buildscript {\n    repositories {\n        google()\n        mavenCentral()\n    }\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "    dependencies {\n        classpath 'com.android.tools.build:gradle:7.2.0'\n    }\n}\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "rootProject.allprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "apply plugin: 'com.android.library'\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "android {\n    namespace 'com.shounakmulay.telephony'\n    compileSdk 34\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "    defaultConfig {\n        minSdkVersion 21\n        targetSdkVersion 34\n        versionCode 1\n        versionName \"1.0\"\n    }\n\n" >> "$TELEPHONY_DIR/android/build.gradle"
            printf "    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_11\n        targetCompatibility JavaVersion.VERSION_11\n    }\n}\n" >> "$TELEPHONY_DIR/android/build.gradle"
            
            # إصلاح AndroidManifest.xml
            mkdir -p "$TELEPHONY_DIR/android/src/main"
            printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest package="com.shounakmulay.telephony" />\n' > "$TELEPHONY_DIR/android/src/main/AndroidManifest.xml"
            
            echo "✅ Telephony library fixed successfully"
          else
            echo "⚠️ Telephony directory not found"
          fi

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk