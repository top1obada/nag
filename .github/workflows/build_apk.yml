name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library
        run: |
          TELEPHONY_DIR=$(find ~/.pub-cache -type d -name "telephony-0.2.0" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_DIR" ]; then
            echo "✅ Found telephony at: $TELEPHONY_DIR"
            
            cat > "$TELEPHONY_DIR/android/build.gradle" << 'EOF'
            group 'com.shounakmulay.telephony'
            version '1.0-SNAPSHOT'
            
            buildscript {
                ext.kotlin_version = '1.8.22'
                repositories {
                    google()
                    mavenCentral()
                }
                dependencies {
                    classpath 'com.android.tools.build:gradle:7.4.2'
                    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                }
            }
            
            apply plugin: 'com.android.library'
            apply plugin: 'kotlin-android'
            
            android {
                namespace 'com.shounakmulay.telephony'
                compileSdk 34
            
                defaultConfig {
                    minSdk 21
                    targetSdk 34
                }
            
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_11
                    targetCompatibility JavaVersion.VERSION_11
                }
            
                kotlinOptions {
                    jvmTarget = '11'
                }
            }
            
            dependencies {
                implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:\$kotlin_version"
                implementation 'androidx.annotation:annotation:1.7.0'
            }
            EOF
            
            echo "✅ Telephony library fixed"
          else
            echo "⚠️ Telephony directory not found"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk