name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library
        run: |
          TELEPHONY_GRADLE=$(find ~/.pub-cache -path "*/telephony-0.2.0/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_GRADLE" ]; then
            echo "✅ Found telephony at: $TELEPHONY_GRADLE"
            rm -f "$TELEPHONY_GRADLE"
            echo "group 'com.psplug.telephony'" > "$TELEPHONY_GRADLE"
            echo "version '1.0-SNAPSHOT'" >> "$TELEPHONY_GRADLE"
            echo "" >> "$TELEPHONY_GRADLE"
            echo "buildscript {" >> "$TELEPHONY_GRADLE"
            echo "    repositories {" >> "$TELEPHONY_GRADLE"
            echo "        google()" >> "$TELEPHONY_GRADLE"
            echo "        mavenCentral()" >> "$TELEPHONY_GRADLE"
            echo "    }" >> "$TELEPHONY_GRADLE"
            echo "    dependencies {" >> "$TELEPHONY_GRADLE"
            echo "        classpath 'com.android.tools.build:gradle:7.4.2'" >> "$TELEPHONY_GRADLE"
            echo "    }" >> "$TELEPHONY_GRADLE"
            echo "}" >> "$TELEPHONY_GRADLE"
            echo "" >> "$TELEPHONY_GRADLE"
            echo "apply plugin: 'com.android.library'" >> "$TELEPHONY_GRADLE"
            echo "" >> "$TELEPHONY_GRADLE"
            echo "android {" >> "$TELEPHONY_GRADLE"
            echo "    namespace 'com.telephony'" >> "$TELEPHONY_GRADLE"
            echo "    compileSdk 34" >> "$TELEPHONY_GRADLE"
            echo "" >> "$TELEPHONY_GRADLE"
            echo "    defaultConfig {" >> "$TELEPHONY_GRADLE"
            echo "        minSdk 21" >> "$TELEPHONY_GRADLE"
            echo "        targetSdk 34" >> "$TELEPHONY_GRADLE"
            echo "    }" >> "$TELEPHONY_GRADLE"
            echo "" >> "$TELEPHONY_GRADLE"
            echo "    compileOptions {" >> "$TELEPHONY_GRADLE"
            echo "        sourceCompatibility JavaVersion.VERSION_11" >> "$TELEPHONY_GRADLE"
            echo "        targetCompatibility JavaVersion.VERSION_11" >> "$TELEPHONY_GRADLE"
            echo "    }" >> "$TELEPHONY_GRADLE"
            echo "}" >> "$TELEPHONY_GRADLE"
            echo "✅ Fixed telephony library successfully"
          else
            echo "⚠️ Telephony gradle file not found"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk