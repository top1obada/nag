name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library
        run: |
          TELEPHONY_DIR=$(find ~/.pub-cache -type d -name "telephony-0.2.0" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_DIR" ]; then
            echo "✅ Found telephony at: $TELEPHONY_DIR"
            rm -f "$TELEPHONY_DIR/android/build.gradle"
            echo "group 'com.shounakmulay.telephony'" > "$TELEPHONY_DIR/android/build.gradle"
            echo "version '1.0-SNAPSHOT'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "buildscript {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    ext.kotlin_version = '1.8.22'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    repositories {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        google()" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        mavenCentral()" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    }" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    dependencies {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        classpath 'com.android.tools.build:gradle:7.4.2'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\"" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    }" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "}" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "apply plugin: 'com.android.library'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "apply plugin: 'kotlin-android'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "android {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    namespace 'com.shounakmulay.telephony'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    compileSdk 34" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    defaultConfig {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        minSdk 21" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        targetSdk 34" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    }" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    compileOptions {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        sourceCompatibility JavaVersion.VERSION_11" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        targetCompatibility JavaVersion.VERSION_11" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    }" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    kotlinOptions {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "        jvmTarget = '11'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    }" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "}" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "dependencies {" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    implementation \"org.jetbrains.kotlin:kotlin-stdlib-jdk7:\$kotlin_version\"" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "    implementation 'androidx.annotation:annotation:1.7.0'" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "}" >> "$TELEPHONY_DIR/android/build.gradle"
            echo "✅ Telephony library fixed"
          else
            echo "⚠️ Telephony directory not found"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk