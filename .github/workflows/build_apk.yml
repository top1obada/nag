name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library completely
        run: |
          # العثور على مجلد telephony
          TELEPHONY_DIR=$(find ~/.pub-cache -type d -name "telephony-0.2.0" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_DIR" ]; then
            echo "Found telephony at: $TELEPHONY_DIR"
            
            # حذف build.gradle القديم
            rm -f "$TELEPHONY_DIR/android/build.gradle"
            
            # إنشاء build.gradle صحيح وكامل
            cat > "$TELEPHONY_DIR/android/build.gradle" << 'EOF'
            group 'com.shounakmulay.telephony'
            version '1.0-SNAPSHOT'
            
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                }
            
                dependencies {
                    classpath 'com.android.tools.build:gradle:7.2.0'
                }
            }
            
            rootProject.allprojects {
                repositories {
                    google()
                    mavenCentral()
                }
            }
            
            apply plugin: 'com.android.library'
            
            android {
                namespace 'com.shounakmulay.telephony'
                compileSdk 34
            
                defaultConfig {
                    minSdkVersion 21
                    targetSdkVersion 34
                    versionCode 1
                    versionName "1.0"
                }
            
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_11
                    targetCompatibility JavaVersion.VERSION_11
                }
            }
            EOF
            
            # إصلاح AndroidManifest.xml
            mkdir -p "$TELEPHONY_DIR/android/src/main"
            cat > "$TELEPHONY_DIR/android/src/main/AndroidManifest.xml" << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <manifest package="com.shounakmulay.telephony" />
            EOF
            
            echo "✅ Telephony library fixed successfully"
          else
            echo "⚠️ Telephony directory not found"
          fi

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk