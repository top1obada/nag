name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library
        run: |
          # إصلاح مشكلة namespace في مكتبة telephony القديمة
          TELEPHONY_GRADLE=$(find ~/.pub-cache -path "*/telephony-0.2.0/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_GRADLE" ]; then
            echo "Patching $TELEPHONY_GRADLE"
            sed -i '1i android {\n    namespace "com.telephony"\n}\n' $TELEPHONY_GRADLE
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk