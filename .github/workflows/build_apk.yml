name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix telephony library
        run: |
          TELEPHONY_DIR=$(find ~/.pub-cache -type d -name "telephony-0.2.0" 2>/dev/null | head -1)
          if [ -n "$TELEPHONY_DIR" ]; then
            rm -f "$TELEPHONY_DIR/android/build.gradle"
            echo "android { namespace 'com.telephony' compileSdk 34 defaultConfig { minSdk 21 targetSdk 34 } }" > "$TELEPHONY_DIR/android/build.gradle"
            mkdir -p "$TELEPHONY_DIR/android/src/main"
            echo '<?xml version="1.0" encoding="utf-8"?><manifest />' > "$TELEPHONY_DIR/android/src/main/AndroidManifest.xml"
            echo "✅ Telephony library fixed"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: naghom.apk
          path: build/app/outputs/flutter-apk/app-release.apk